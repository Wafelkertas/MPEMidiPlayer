plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.mpemidiplayer'
    compileSdk 34

    defaultConfig {
        applicationId 'com.example.mpemidiplayer'
        minSdk 29
        targetSdk 34

        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17 -O3 -fno-exceptions -fno-rtti'
            }
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
            version '3.22.1'
        }
    }
}

dependencies {}
